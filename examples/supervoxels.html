<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="">
<meta name="author" content="">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SVX Supervoxels Viewer</title>

<link rel="stylesheet" type="text/css" href="../build/potree/potree.css">
<link rel="stylesheet" type="text/css" href="../build/potree/svx-potree.css">
<link rel="stylesheet" type="text/css" href="../libs/jquery-ui/jquery-ui.min.css">
<link rel="stylesheet" type="text/css" href="../libs/openlayers3/ol.css">
<link rel="stylesheet" type="text/css" href="../libs/spectrum/spectrum.css">
<link rel="stylesheet" type="text/css" href="../libs/jstree/themes/mixed/style.css">
</head>

<body>
<script src="../libs/jquery/jquery-3.1.1.min.js"></script>
<script src="../libs/spectrum/spectrum.js"></script>
<script src="../libs/jquery-ui/jquery-ui.min.js"></script>
<script src="../libs/other/BinaryHeap.js"></script>
<script src="../libs/tween/tween.min.js"></script>
<script src="../libs/d3/d3.js"></script>
<script src="../libs/proj4/proj4.js"></script>
<script src="../libs/openlayers3/ol.js"></script>
<script src="../libs/i18next/i18next.js"></script>
<script src="../libs/jstree/jstree.js"></script>
<script src="../build/potree/potree.js"></script>
<script src="../build/potree/svx.js"></script>
<script src="../libs/plasio/js/laslaz.js"></script>
<script src="../libs/other/stats.js"></script>

<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
<div id="potree_render_area" style="background-image: url('../build/potree/resources/images/background.jpg');"></div>
<div id="potree_sidebar_container"> </div>
</div>

<script type="module">

import * as THREE from "../libs/three.js/build/three.module.js";

/**
 * SVX Supervoxels Example
 *
 * Demonstrates:
 *  - SVXViewer: extends Potree Viewer with segmentation support
 *  - loadSVXPointCloud: loads point cloud with external scalar attributes
 *  - SVXPointCloudMaterial: segment-based classification rendering
 */

// Use SVXViewer (adds segmentation support, disables URL settings)
window.viewer = new SVX.SVXViewer(document.getElementById("potree_render_area"));

viewer.setEDLEnabled(true);
viewer.setFOV(60);
viewer.setPointBudget(5_000_000);

viewer.setDescription("SVX Supervoxels demo - scalar attributes from /scalars/*.bin");

viewer.loadGUI().then(() => {
viewer.setLanguage("en");
viewer.toggleSidebar();
});

// Use SVX loader (supports scalar attributes in metadata.scalarAttributes)
SVX.loadSVXPointCloudAsync("/pointclouds/svx-plomari/metadata.json", "SVX-PLOMARI")
.then(e => {
viewer.scene.addPointCloud(e.pointcloud);

const material = e.pointcloud.material;
material.size = 1.2;
material.activeAttributeName = "rgba";

window.pco = e.pointcloud;
viewer.fitToScreen();
})
.catch(err => console.error("SVX load error:", err));

// Log clicked point attributes (useful for debugging segment IDs)
viewer.renderer.domElement.addEventListener("click", (event) => {
const mouse = new THREE.Vector2();
const rect = viewer.renderer.domElement.getBoundingClientRect();
mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

const camera = viewer.scene.getActiveCamera();
const raycaster = new THREE.Raycaster();
raycaster.setFromCamera(mouse, camera);
raycaster.params.Points.threshold = 0.1;

const intersects = raycaster.intersectObjects(viewer.scene.pointclouds, true);
if (intersects.length > 0) {
const { object: pointCloud, index } = intersects[0];
const geometry = pointCloud.geometry;
if (geometry && geometry.attributes) {
const attrs = {};
for (const name in geometry.attributes) {
const attr = geometry.attributes[name];
const vals = [];
for (let i = 0; i < attr.itemSize; i++) {
vals.push(attr.array[index * attr.itemSize + i]);
}
attrs[name] = attr.itemSize === 1 ? vals[0] : vals;
}
console.log("Clicked point attributes:", attrs);
}
}
});

</script>

</body>
</html>
