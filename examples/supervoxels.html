<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree Viewer</title>

	<link rel="stylesheet" type="text/css" href="../build/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="../libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="../libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="../libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="../libs/jstree/themes/mixed/style.css">
</head>

<body>
	<script src="../libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="../libs/spectrum/spectrum.js"></script>
	<script src="../libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="../libs/other/BinaryHeap.js"></script>
	<script src="../libs/tween/tween.min.js"></script>
	<script src="../libs/d3/d3.js"></script>
	<script src="../libs/proj4/proj4.js"></script>
	<script src="../libs/openlayers3/ol.js"></script>
	<script src="../libs/i18next/i18next.js"></script>
	<script src="../libs/jstree/jstree.js"></script>
	<script src="../build/potree/potree.js"></script>
	<script src="../libs/plasio/js/laslaz.js"></script>
	<script src="../libs/other/stats.js"></script>
    <script src="svx/segmentation.js"></script>
	<script src="svx/classification.js"></script>
	
	<!-- INCLUDE ADDITIONAL DEPENDENCIES HERE -->
	<!-- INCLUDE SETTINGS HERE -->
	
	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		<div id="potree_render_area" style="background-image: url('../build/potree/resources/images/background.jpg');"></div>
		<div id="potree_sidebar_container"> </div>
		<div style="position: absolute; top: 12px; right: 12px; z-index: 1000; background: rgba(0,0,0,0.6); color: white; padding: 8px 10px; border-radius: 4px; font-family: sans-serif; font-size: 13px;">
			<label for="segmentation_selector" style="margin-right: 8px;">Segmentation:</label>
			<select id="segmentation_selector" style="font-size: 13px;">
				<option value="segmentation1" selected>1</option>
				<option value="segmentation2">2</option>
				<option value="segmentation3">3</option>
			</select>
		</div>
	</div>
	
	<script type="module">

	import * as THREE from "../libs/three.js/build/three.module.js";

		// import * as Potree from "../src/Potree.js";
	
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
		
		viewer.setEDLEnabled(true);
		viewer.setFOV(60);
		viewer.setPointBudget(5_000_000);
		viewer.loadSettingsFromURL();
		
		viewer.setDescription(`Point cloud courtesy of PG&E and <a href="https://opentopography.org/">Open Topography</a>.`);
		
		viewer.loadGUI().then( () => {
			viewer.setLanguage('en');
			// $("#menu_filters").next().show();
			viewer.toggleSidebar();
		});
		
		Potree.loadPointCloud("/pointclouds/svx-plomari/metadata.json", "SVX-PLOMARI", function(e){
			viewer.scene.addPointCloud(e.pointcloud);
			e.pointcloud.position.z = 0;
			let material = e.pointcloud.material;
			material.size = 1.2;
			//material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			material.activeAttributeName = "rgba";

			material.setSegmentationLevel(2);
            viewer.setClassifications(sample_classification)

			window.pco = e.pointcloud;
			viewer.fitToScreen()
			//viewer.scene.view.setView(
			//	[694517.403, 3899262.595, 10642.698],
			//	[694878.410, 3916332.067, 14.497],
			//);
		});

		const segmentationSelector = document.getElementById("segmentation_selector");
		segmentationSelector.addEventListener("change", (event) => {
			if (!window.pco || !window.pco.material) {
				return;
			}

			window.pco.material.activeAttributeName = event.target.value;
		});
		
		// Add click handler to log clicked points
		viewer.renderer.domElement.addEventListener('click', (event) => {
			const mouse = new THREE.Vector2();
			const rect = viewer.renderer.domElement.getBoundingClientRect();
			
			mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
			mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
			
			const camera = viewer.scene.getActiveCamera();
			const raycaster = new THREE.Raycaster();
			raycaster.setFromCamera(mouse, camera);
			raycaster.params.Points.threshold = 0.1;
			
			const intersects = raycaster.intersectObjects(viewer.scene.pointclouds, true);
			
			if (intersects.length > 0) {
				const intersection = intersects[0];
				const pointCloud = intersection.object;
				const geometry = pointCloud.geometry;
				const index = intersection.index;
				
				console.log('Clicked point:', {
					position: intersection.point,
					distance: intersection.distance,
					pointCloud: pointCloud.name,
					index: index
				});
				
				// Log all point attributes
				if (geometry && geometry.attributes) {
					const attributes = {};
					
					for (const attributeName in geometry.attributes) {
						const attribute = geometry.attributes[attributeName];
						const itemSize = attribute.itemSize;
						const values = [];
						
						for (let i = 0; i < itemSize; i++) {
							values.push(attribute.array[index * itemSize + i]);
						}
						
						attributes[attributeName] = itemSize === 1 ? values[0] : values;
					}
					
					console.log('Point attributes:', attributes);
				}
			}
		});
		
	</script>
	
	
  </body>
</html>
